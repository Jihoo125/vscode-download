<!DOCTYPE html>
<html lang="ko">
<head>
  <title>border-radius test</title>
  <style>
    div > div{width: 200px; height: 150px; border: 3px solid #444;}
    div.wrap_divs{display: flex; justify-content: space-around;}
    div#box1{border-radius: 20px/20px;}
    div#box2{border-top-left-radius: 30px 30px;}
    div#box3{}
    div#box4{}
  </style>
</head>
<body>
  <div class="wrap_divs">
    <div id="box1"></div>
    <div id="box2"></div>
    <div id="box3"></div>
    <div id="box4"></div>
  </div>
</body>
</html>
