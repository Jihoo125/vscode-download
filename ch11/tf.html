<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #ex {
            display: flex;
            flex-wrap: wrap;
        }

        #ex div {
            position: relative;
            float: left;
            width: 100px;
            height: 50px;
            margin: 5px 10px;
            padding: 5px;
            color: #10ffacde;
            background-color: #f3ace7f5;
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
            animation: grow-shrink 0.5s infinite;
        }

        /* Image Styling */
        #ex img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100px;
            object-fit: contain; /* Scales the image to fit the div */
            transform: rotate(90deg); /* Rotates the image 90 degrees */
            z-index: -1; /* Ensures the image is behind the text */
        }

        /* Keyframe animation */
        @keyframes grow-shrink {
            0%, 100% {
                height: 50px;
            }
            50% {
                height: 900px;
            }
        }

        /* Different easing options for each div */
        #ex .ease {
            animation-timing-function: ease;
        }
        #ex .linear {
            animation-timing-function: linear;
        }
        #ex .ease-in {
            animation-timing-function: ease-in;
        }
        #ex .ease-out {
            animation-timing-function: ease-out;
        }
        #ex .ease-in-out {
            animation-timing-function: ease-in-out;
        }
    </style>
</head>
<body>
    <div id="ex">
        <img src="./pasta.jpg" alt="Background">
        <div class="ease">
            ease
        </div>
        <div class="linear">
            linear
        </div>
        <div class="ease-in">
            ease-in
        </div>
        <div class="ease-out">
            ease-out
        </div>
        <div class="ease-in-out">
            ease-in-out
        </div>
    </div>
</body>
</html>
