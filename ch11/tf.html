<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #ex {
            position: relative;
            display: flex;
            flex-wrap: wrap;
        }

        #ex div {
            float: left;
            width: 100px;
            height: 50px;
            margin: 5px 10px;
            padding: 5px;
            color: #10ffacde;
            background-color: #f3ace7f5;
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
            animation: grow-shrink 0.5s infinite;
            position: relative; /* Needed to keep stacking context */
            z-index: 0; /* Divs stay below the image */
        }

        /* Image Styling */
        #ex img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100px; /* Matches the width of each div */
            height: 50px; /* Matches the height of each div */
            transform: rotate(90deg);
            z-index: 2; /* Image stays on top of the divs */
            pointer-events: none; /* Prevents the image from blocking interactions with the divs */
        }

        /* Keyframe animation */
        @keyframes grow-shrink {
            0%, 100% {
                height: 50px;
            }
            50% {
                height: 900px;
            }
        }

        /* Different easing options for each div */
        #ex .ease {
            animation-timing-function: ease;
        }
        #ex .linear {
            animation-timing-function: linear;
        }
        #ex .ease-in {
            animation-timing-function: ease-in;
        }
        #ex .ease-out {
            animation-timing-function: ease-out;
        }
        #ex .ease-in-out {
            animation-timing-function: ease-in-out;
        }
    </style>
</head>
<body>
    <div id="ex">
        <div class="ease">
            <img src="./pasta.jpg" alt="Foreground">
            ease
        </div>
        <div class="linear">
            <img src="./pasta.jpg" alt="Foreground">
            linear
        </div>
        <div class="ease-in">
            <img src="./pasta.jpg" alt="Foreground">
            ease-in
        </div>
        <div class="ease-out">
            <img src="./pasta.jpg" alt="Foreground">
            ease-out
        </div>
        <div class="ease-in-out">
            <img src="./pasta.jpg" alt="Foreground">
            ease-in-out
        </div>
    </div>
</body>
</html>
