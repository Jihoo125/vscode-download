<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            margin: 20px auto;
            height: 100px;
            width: 100px;
            background-color: #12afbdfd;
            border: 1px solid #adecd9be;
            animation: grow-shrink 1s infinite;
            transition-property: width height;
            transition-duration: 2s, 1s;
        }

        @keyframes grow-shrink {
            0%, 100% {
                width: 100px;
                height: 100px;
            }
            50% {
                width: 200px;
                height: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="box"></div>
</body>
</html>
