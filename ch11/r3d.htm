<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #container{
            width: 800px;
            margin: 20px auto;
        }
        .origin{
            width: 100px;
            height: 100px;
            float: left;
            margin: 40px;
            border: 1px solid #1affcdee;
            perspective: 200px;
        }
        .origin > div{
            width: 100px;
            height: 100px;
            background-color: #9fadeeff;
            transition: all 5000s;
        }
        #rotatex{
            transform: rotateX('55deg')
        }
        #rotatey{
            transform: rotateY('55deg')
        }
        #rotatez{
            transform: rotateX('55deg')
        }
        #rotatexy{
            transform: rotate3d(2.5, 1.2, -1.5, )
        }
    </style>
</head>
<body>
    <div class="origin"><div id="rotatex"></div>
    <div class="origin"><div id="rotatey"></div>
    <div class="origin"><div id="rotatez"></div>
    <div class="origin"><div id="rotatexyz"></div>
</body>
</html>
