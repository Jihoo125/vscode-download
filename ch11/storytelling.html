<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
        }
        p, img {
            position: relative;
            transition: transform 0.3s ease-in-out;
        }
        .sticky {
            position: sticky;
            top: 10px; /* Adjust this as needed */
        }
        .image-container {
            width: 200px;
            height: auto;
        }
        .spec-title {
            font-size: x-large;
            font-weight: bold;
        }
        .spec-detail {
            font-size: large;
        }
    </style>
</head>
<body>
    <p class="sticky" style="font-size: xx-large; font-weight: bolder;">
        <big>Windows 7 SP1 success!</big>
    </p>
    <img src="./1733736628523.jpg" class="image-container" alt="Windows 7 success image">
    <section>
        <p class="spec-title">Specifications:</p>
        <p class="spec-title">Motherboard:</p>
        <p class="spec-detail">ASRock H310CM-HDV</p>
        <p class="spec-title">CPU:</p>
        <p class="spec-detail">Intel Celeron G4900</p>
        <p class="spec-title">GPU:</p>
        <p class="spec-detail">Intel Graphics UHD 610</p>
        <p class="spec-title">RAM:</p>
        <p class="spec-detail">Samsung DDR4-2400 4GB (4GB*1)</p>
        <p class="spec-title">HDD:</p>
        <p class="spec-detail">WDC WDS120G1GOA-00SS50 120GB</p>
    </section>
</body>
</html>
