<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            height: 2000px; /* Makes the page long enough to scroll */
            font-family: Arial, sans-serif;
        }

        p, img {
            position: sticky;
            top: 50px;
            transition: transform 0.3s ease-in-out;
        }

        p {
            font-size: xx-large;
            font-weight: bolder;
        }

        img {
            width: 200px;
            height: auto;
            transition: transform 0.3s ease-in-out;
        }

        /* When the element moves during scroll */
        p, img {
            transform: translateY(0);
        }

        /* Add a class to move on scroll */
        body:has(:nth-child(2):not(:hover)) p, body:has(:nth-child(2):not(:hover)) img {
            transform: translateY(200px);
        }
    </style>
</head>
<body>
    <img id="main">
    <p>Windows 7 SP1 success!</p>
    <img src="./1733736628523.jpg">
    <p>Specifications:</p>
    <p>Motherboard:</p>
    <p>ASRock H310CM-HDV</p>
    <p>CPU:</p>
    <p>Intel Celeron G4900</p>
    <p>GPU:</p>
    <p>Intel Graphics UHD 610</p>
    <p>RAM:</p>
    <p>Samsung DDR4-2400 4GB (4GB*1)</p>
    <p>HDD:</p>
    <p>WDC WDS120G1GOA-00SS50 120GB</p>
</body>
</html>
